apiVersion: apps/v1
kind: Deployment
metadata:
  name: investigation-team-api
  namespace: investigation-team
  labels:
    app: investigation-team-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: investigation-team-api
  template:
    metadata:
      labels:
        app: investigation-team-api
    spec:
      containers:
        - name: api
          image: investigation-team-api:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: investigation-team-config
                  key: APP_NAME
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: investigation-team-config
                  key: APP_VERSION
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: investigation-team-config
                  key: DEBUG
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: investigation-team-config
                  key: LOG_LEVEL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
