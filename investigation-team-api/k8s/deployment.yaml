apiVersion: apps/v1
kind: Deployment
metadata:
  name: investigation-team-api
  namespace: investigation-team
  labels:
    app: investigation-team-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: investigation-team-api
  template:
    metadata:
      labels:
        app: investigation-team-api
    spec:
      containers:
        - name: api
          image: investigation-team-api:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ConnectionStrings__DefaultConnection
              value: "Host=postgres-svc;Port=5432;Database=investigation_team;Username=postgres;Password=postgres"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
