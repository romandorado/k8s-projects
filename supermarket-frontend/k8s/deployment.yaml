apiVersion: apps/v1
kind: Deployment
metadata:
  name: supermarket-frontend
  namespace: supermarket
  labels:
    app: supermarket-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: supermarket-frontend
  template:
    metadata:
      labels:
        app: supermarket-frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/library/supermarket-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
