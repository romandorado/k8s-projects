apiVersion: v1
kind: Secret
metadata:
  name: terraria-agent-secret
  namespace: terraria
type: Opaque
stringData:
  # Reemplaza con tu token de TShock (Settings/LoginToken del server)
  tshock-token: "TU_TOKEN_AQUI"
  # Reemplaza con tu API key de Groq (https://console.groq.com)
  groq-api-key: "gsk_TU_API_KEY_AQUI"
